<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0f1e" />
<title>Monitor DFR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0f1e;
    --surface:  #111827;
    --border:   #1f2d45;
    --accent:   #3b82f6;
    --accent2:  #06b6d4;
    --danger:   #ef4444;
    --success:  #22c55e;
    --text:     #f1f5f9;
    --muted:    #64748b;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 0;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .header .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
  }
  .header h1 span {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ── Status card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* ── Orb ── */
  .orb-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .orb {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.4s;
    position: relative;
    z-index: 1;
  }
  .orb svg { width: 36px; height: 36px; }
  .orb.listening {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 0 0 rgba(59,130,246,0.5);
    animation: pulse-ring 1.8s ease-out infinite;
  }
  .orb.waiting {
    background: linear-gradient(135deg, #f59e0b, #f97316);
  }
  .orb.offline { background: var(--border); }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(59,130,246,0.5); }
    70%  { box-shadow: 0 0 0 24px rgba(59,130,246,0); }
    100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
  }

  /* ── Status text ── */
  .status-text {
    text-align: center;
  }
  .status-text .title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .status-text .sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* ── Volume bar ── */
  .volume-wrap {
    width: 100%;
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  .volume-wrap.visible { display: flex; }
  .volume-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .volume-bar-bg {
    width: 100%;
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .volume-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.08s linear;
  }

  /* ── Audio element ── */
  audio { display: none; }

  /* ── Main button ── */
  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.01em;
  }
  .btn:active { transform: scale(0.97); }
  .btn-start {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-stop {
    background: var(--danger);
    color: #fff;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Footer ── */
  .footer {
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .dot.online { background: var(--success); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e293b;
    color: var(--text);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid var(--border);
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
    z-index: 99;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="label">DFR Seguridad</div>
  <h1>Monitor <span>en Vivo</span></h1>
</div>

<div class="card">
  <div class="orb-wrap">
    <div class="orb offline" id="orb">
      <!-- Mic icon -->
      <svg id="icon-mic" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8"  y1="22" x2="16" y2="22"/>
      </svg>
    </div>
  </div>

  <div class="status-text">
    <div class="title" id="status-title">Listo para escuchar</div>
    <div class="sub"  id="status-sub">Presioná Iniciar para activar el micrófono remoto</div>
  </div>

  <div class="volume-wrap" id="vol-wrap">
    <div class="volume-label">Nivel de audio</div>
    <div class="volume-bar-bg"><div class="volume-bar-fill" id="vol-bar"></div></div>
  </div>

  <audio id="remote-audio" autoplay playsinline></audio>

  <button class="btn btn-start" id="main-btn" onclick="toggleSession()">
    🎧 Iniciar escucha
  </button>
</div>

<div class="footer">
  <div class="dot" id="conn-dot"></div>
  <span id="conn-label">Desconectado</span>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
// ── Firebase config ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyDo1ywPhAW50qEpFWwBu2uEUwX-AfxTWK0",
  authDomain:        "stockdfr-94cd4.firebaseapp.com",
  databaseURL:       "https://stockdfr-94cd4-default-rtdb.firebaseio.com",
  projectId:         "stockdfr-94cd4",
  storageBucket:     "stockdfr-94cd4.firebasestorage.app",
  messagingSenderId: "600419356379",
  appId:             "1:600419356379:web:2b1bd2b32e88f71f6886fe"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── Refs Firebase ─────────────────────────────────────────────────
const REF_CONTROL  = db.ref('/monitor/control');   // padre escribe: { active: bool }
const REF_OFFER    = db.ref('/monitor/offer');     // hijo escribe offer SDP
const REF_ANSWER   = db.ref('/monitor/answer');    // padre escribe answer SDP
const REF_ICE_H    = db.ref('/monitor/ice_hijo');  // candidatos ICE del hijo
const REF_ICE_P    = db.ref('/monitor/ice_padre'); // candidatos ICE del padre
const REF_STATUS   = db.ref('/monitor/status');    // hijo escribe: { online: bool }

// ── Estado ───────────────────────────────────────────────────────
let pc = null;
let active = false;
let audioCtx = null, analyser = null, animFrame = null;

// ── UI helpers ───────────────────────────────────────────────────
const orb         = document.getElementById('orb');
const statusTitle = document.getElementById('status-title');
const statusSub   = document.getElementById('status-sub');
const mainBtn     = document.getElementById('main-btn');
const volWrap     = document.getElementById('vol-wrap');
const volBar      = document.getElementById('vol-bar');
const connDot     = document.getElementById('conn-dot');
const connLabel   = document.getElementById('conn-label');
const remoteAudio = document.getElementById('remote-audio');
const toastEl     = document.getElementById('toast');

let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
}

function setUI(state) {
  // states: idle | waiting | listening
  orb.className = 'orb ' + (state === 'listening' ? 'listening' : state === 'waiting' ? 'waiting' : 'offline');
  if (state === 'idle') {
    statusTitle.textContent = 'Listo para escuchar';
    statusSub.textContent   = 'Presioná Iniciar para activar el micrófono remoto';
    mainBtn.textContent     = '🎧 Iniciar escucha';
    mainBtn.className       = 'btn btn-start';
    volWrap.classList.remove('visible');
    stopVolumeAnim();
  } else if (state === 'waiting') {
    statusTitle.textContent = 'Esperando conexión...';
    statusSub.textContent   = 'El dispositivo de tu hijo está conectándose';
    mainBtn.textContent     = '⏹ Detener';
    mainBtn.className       = 'btn btn-stop';
  } else if (state === 'listening') {
    statusTitle.textContent = 'Escuchando en vivo';
    statusSub.textContent   = 'Audio recibido correctamente';
    mainBtn.textContent     = '⏹ Detener escucha';
    mainBtn.className       = 'btn btn-stop';
    volWrap.classList.add('visible');
  }
}

// ── Volumen animado ───────────────────────────────────────────────
function startVolumeAnim(stream) {
  audioCtx  = new AudioContext();
  analyser  = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  const src = audioCtx.createMediaStreamSource(stream);
  src.connect(analyser);
  const buf = new Uint8Array(analyser.frequencyBinCount);
  function tick() {
    analyser.getByteFrequencyData(buf);
    const avg = buf.reduce((a, b) => a + b, 0) / buf.length;
    volBar.style.width = Math.min(100, avg * 2.5) + '%';
    animFrame = requestAnimationFrame(tick);
  }
  tick();
}
function stopVolumeAnim() {
  if (animFrame) cancelAnimationFrame(animFrame);
  if (audioCtx)  audioCtx.close().catch(() => {});
  audioCtx = analyser = animFrame = null;
  volBar.style.width = '0%';
}

// ── WebRTC ────────────────────────────────────────────────────────
const ICE_SERVERS = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

async function createPeerConnection() {
  if (pc) { pc.close(); pc = null; }
  pc = new RTCPeerConnection(ICE_SERVERS);

  // Cuando llega audio remoto
  pc.ontrack = (e) => {
    const stream = e.streams[0];
    remoteAudio.srcObject = stream;
    remoteAudio.play().catch(() => {});
    setUI('listening');
    startVolumeAnim(stream);
    showToast('✅ Conexión de audio establecida');
  };

  // ICE candidates del padre → Firebase
  pc.onicecandidate = (e) => {
    if (e.candidate) {
      REF_ICE_P.push(e.candidate.toJSON());
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
      showToast('⚠️ Conexión perdida, reintentando...');
      setUI('waiting');
      stopVolumeAnim();
    }
  };

  // Escuchar ICE del hijo
  REF_ICE_H.on('child_added', async (snap) => {
    const cand = snap.val();
    if (pc && cand) {
      try { await pc.addIceCandidate(new RTCIceCandidate(cand)); } catch(e) {}
    }
  });

  // Escuchar offer del hijo
  REF_OFFER.once('value', async (snap) => {
    const offer = snap.val();
    if (!offer || !pc) return;
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await REF_ANSWER.set({ type: answer.type, sdp: answer.sdp });
  });

  // También escuchar si el offer llega después
  REF_OFFER.on('value', async (snap) => {
    const offer = snap.val();
    if (!offer || !pc || pc.remoteDescription) return;
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await REF_ANSWER.set({ type: answer.type, sdp: answer.sdp });
  });
}

// ── Sesión principal ──────────────────────────────────────────────
async function toggleSession() {
  if (!active) {
    await startSession();
  } else {
    await stopSession();
  }
}

async function startSession() {
  active = true;
  setUI('waiting');

  // Limpiar señalización anterior
  await REF_OFFER.remove();
  await REF_ANSWER.remove();
  await REF_ICE_H.remove();
  await REF_ICE_P.remove();

  // Indicar al hijo que el padre está escuchando
  await REF_CONTROL.set({ active: true, ts: Date.now() });

  await createPeerConnection();
  showToast('📡 Señal enviada al dispositivo remoto');
}

async function stopSession() {
  active = false;
  await REF_CONTROL.set({ active: false, ts: Date.now() });

  if (pc) { pc.close(); pc = null; }
  remoteAudio.srcObject = null;
  stopVolumeAnim();
  setUI('idle');

  // Limpiar Firebase
  await REF_OFFER.remove();
  await REF_ANSWER.remove();
  await REF_ICE_H.remove();
  await REF_ICE_P.remove();

  showToast('⏹ Escucha detenida');
}

// ── Estado online del hijo ────────────────────────────────────────
REF_STATUS.on('value', (snap) => {
  const val = snap.val();
  if (val && val.online) {
    connDot.classList.add('online');
    connLabel.textContent = 'App del hijo: activa';
  } else {
    connDot.classList.remove('online');
    connLabel.textContent = val ? 'App del hijo: inactiva' : 'Desconectado';
  }
});

// ── Limpiar al cerrar ─────────────────────────────────────────────
window.addEventListener('beforeunload', () => {
  if (active) {
    REF_CONTROL.set({ active: false, ts: Date.now() });
  }
});
</script>
</body>
</html>
