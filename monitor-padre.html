<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0a0f1e" />
<title>Monitor DFR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0f1e; --surface: #111827; --border: #1f2d45;
    --accent: #3b82f6; --accent2: #06b6d4;
    --danger: #ef4444; --success: #22c55e;
    --text: #f1f5f9; --muted: #64748b;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
  body { display: flex; flex-direction: column; align-items: center; padding: 24px 16px 32px; }

  .header { text-align: center; margin-bottom: 24px; }
  .header .label { font-size: 11px; font-weight: 600; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .header h1 { font-size: 26px; font-weight: 700; }
  .header h1 span { background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .selector { display: flex; gap: 10px; width: 100%; max-width: 360px; margin-bottom: 20px; }
  .hijo-btn {
    flex: 1; padding: 12px 6px; border: 1.5px solid var(--border);
    border-radius: 14px; background: var(--surface);
    color: var(--muted); font-size: 13px; font-weight: 600;
    font-family: 'Inter', sans-serif; cursor: pointer;
    transition: all 0.2s; text-align: center; line-height: 1.4;
  }
  .hijo-btn .emoji { font-size: 20px; display: block; margin-bottom: 4px; }
  .hijo-btn.active { border-color: var(--accent); color: var(--text); background: rgba(59,130,246,0.1); }
  .hijo-btn .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: inline-block; margin-top: 4px; transition: background 0.3s; }
  .hijo-btn.online-ind .status-dot { background: var(--success); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px 20px; width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; gap: 18px; }

  .orb { width: 80px; height: 80px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; transition: background 0.4s; }
  .orb svg { width: 36px; height: 36px; }
  .orb.listening { background: linear-gradient(135deg, var(--accent), var(--accent2)); animation: pulse-ring 1.8s ease-out infinite; }
  .orb.waiting { background: linear-gradient(135deg, #f59e0b, #f97316); }
  @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.5); } 70% { box-shadow: 0 0 0 24px rgba(59,130,246,0); } 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); } }

  .nombre-activo { font-size: 22px; font-weight: 700; color: var(--text); }
  .status-text { text-align: center; }
  .status-text .title { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .status-text .sub { font-size: 13px; color: var(--muted); line-height: 1.5; }

  .volume-wrap { width: 100%; display: none; flex-direction: column; gap: 6px; }
  .volume-wrap.visible { display: flex; }
  .volume-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .volume-bar-bg { width: 100%; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .volume-bar-fill { height: 100%; width: 0%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.08s linear; }

  audio { display: none; }
  .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn-start { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-stop { background: var(--danger); color: #fff; }

  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1e293b; color: var(--text); padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; border: 1px solid var(--border); transition: transform 0.3s cubic-bezier(.34,1.56,.64,1); white-space: nowrap; z-index: 99; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="header">
  <div class="label">DFR Seguridad</div>
  <h1>Monitor <span>en Vivo</span></h1>
</div>

<div class="selector">
  <button class="hijo-btn active" id="btn-axel" onclick="seleccionarHijo('axel','Axel',this)">
    <span class="emoji">👦</span>Axel<br><span class="status-dot" id="dot-axel"></span>
  </button>
  <button class="hijo-btn" id="btn-aleks" onclick="seleccionarHijo('aleks','Aleks',this)">
    <span class="emoji">👦</span>Aleks<br><span class="status-dot" id="dot-aleks"></span>
  </button>
  <button class="hijo-btn" id="btn-vanesa" onclick="seleccionarHijo('vanesa','Vanesa',this)">
    <span class="emoji">👧</span>Vanesa<br><span class="status-dot" id="dot-vanesa"></span>
  </button>
</div>

<div class="card">
  <div class="orb" id="orb">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="8" y1="22" x2="16" y2="22"/>
    </svg>
  </div>
  <div class="nombre-activo" id="nombre-activo">Axel</div>
  <div class="status-text">
    <div class="title" id="status-title">Listo para escuchar</div>
    <div class="sub" id="status-sub">Presioná Iniciar para activar el micrófono remoto</div>
  </div>
  <div class="volume-wrap" id="vol-wrap">
    <div class="volume-label">Nivel de audio</div>
    <div class="volume-bar-bg"><div class="volume-bar-fill" id="vol-bar"></div></div>
  </div>
  <audio id="remote-audio" autoplay playsinline></audio>
  <button class="btn btn-start" id="main-btn" onclick="toggleSession()">🎧 Iniciar escucha</button>
</div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDo1ywPhAW50qEpFWwBu2uEUwX-AfxTWK0",
  authDomain:"stockdfr-94cd4.firebaseapp.com",
  databaseURL:"https://stockdfr-94cd4-default-rtdb.firebaseio.com",
  projectId:"stockdfr-94cd4",
  storageBucket:"stockdfr-94cd4.firebasestorage.app",
  messagingSenderId:"600419356379",
  appId:"1:600419356379:web:2b1bd2b32e88f71f6886fe"
});
const db = firebase.database();

let hijoActual='axel', nombreActual='Axel', pc=null, active=false;
let audioCtx=null, analyser=null, animFrame=null;

function refs(h) {
  return {
    control: db.ref(`/monitor/${h}/control`),
    offer:   db.ref(`/monitor/${h}/offer`),
    answer:  db.ref(`/monitor/${h}/answer`),
    iceH:    db.ref(`/monitor/${h}/ice_hijo`),
    iceP:    db.ref(`/monitor/${h}/ice_padre`),
    status:  db.ref(`/monitor/${h}/status`),
  };
}

['axel','aleks','vanesa'].forEach(h => {
  db.ref(`/monitor/${h}/status`).on('value', snap => {
    const v = snap.val();
    const btn = document.getElementById(`btn-${h}`);
    if (v && v.online) btn.classList.add('online-ind');
    else btn.classList.remove('online-ind');
  });
});

const orb=document.getElementById('orb');
const statusTitle=document.getElementById('status-title');
const statusSub=document.getElementById('status-sub');
const mainBtn=document.getElementById('main-btn');
const volWrap=document.getElementById('vol-wrap');
const volBar=document.getElementById('vol-bar');
const remoteAudio=document.getElementById('remote-audio');
const toastEl=document.getElementById('toast');
const nombreActivoEl=document.getElementById('nombre-activo');
let toastTimer;

function showToast(msg) {
  toastEl.textContent=msg; toastEl.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.classList.remove('show'),3000);
}

function setUI(state) {
  orb.className='orb '+(state==='listening'?'listening':state==='waiting'?'waiting':'');
  if(state==='idle'){
    statusTitle.textContent='Listo para escuchar';
    statusSub.textContent='Presioná Iniciar para activar el micrófono remoto';
    mainBtn.textContent='🎧 Iniciar escucha'; mainBtn.className='btn btn-start';
    volWrap.classList.remove('visible'); stopVolumeAnim();
  } else if(state==='waiting'){
    statusTitle.textContent='Esperando conexión...';
    statusSub.textContent=`Conectando con ${nombreActual}...`;
    mainBtn.textContent='⏹ Detener'; mainBtn.className='btn btn-stop';
  } else if(state==='listening'){
    statusTitle.textContent='Escuchando en vivo';
    statusSub.textContent='Audio recibido correctamente';
    mainBtn.textContent='⏹ Detener escucha'; mainBtn.className='btn btn-stop';
    volWrap.classList.add('visible');
  }
}

async function seleccionarHijo(hijo, nombre, btnEl) {
  if(active) await stopSession();
  hijoActual=hijo; nombreActual=nombre;
  nombreActivoEl.textContent=nombre;
  document.querySelectorAll('.hijo-btn').forEach(b=>b.classList.remove('active'));
  btnEl.classList.add('active'); setUI('idle');
}

function startVolumeAnim(stream) {
  audioCtx=new AudioContext(); analyser=audioCtx.createAnalyser(); analyser.fftSize=256;
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  const buf=new Uint8Array(analyser.frequencyBinCount);
  function tick(){ analyser.getByteFrequencyData(buf); volBar.style.width=Math.min(100,buf.reduce((a,b)=>a+b,0)/buf.length*2.5)+'%'; animFrame=requestAnimationFrame(tick); }
  tick();
}
function stopVolumeAnim(){ if(animFrame)cancelAnimationFrame(animFrame); if(audioCtx)audioCtx.close().catch(()=>{}); audioCtx=analyser=animFrame=null; volBar.style.width='0%'; }

const ICE={iceServers:[{urls:'stun:stun.l.google.com:19302'}]};

async function createPC() {
  if(pc){pc.close();pc=null;}
  const r=refs(hijoActual);
  pc=new RTCPeerConnection(ICE);
  pc.ontrack=(e)=>{ const s=e.streams[0]; remoteAudio.srcObject=s; remoteAudio.play().catch(()=>{}); setUI('listening'); startVolumeAnim(s); showToast(`✅ Conectado con ${nombreActual}`); };
  pc.onicecandidate=(e)=>{ if(e.candidate)r.iceP.push(e.candidate.toJSON()); };
  pc.onconnectionstatechange=()=>{ if(pc.connectionState==='disconnected'||pc.connectionState==='failed'){setUI('waiting');stopVolumeAnim();showToast('⚠️ Conexión perdida');} };
  r.iceH.on('child_added',async snap=>{ const c=snap.val(); if(pc&&c)try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch(e){} });
  r.offer.on('value',async snap=>{ const o=snap.val(); if(!o||!pc||pc.remoteDescription)return; await pc.setRemoteDescription(new RTCSessionDescription(o)); const a=await pc.createAnswer(); await pc.setLocalDescription(a); await r.answer.set({type:a.type,sdp:a.sdp}); });
}

async function toggleSession(){ if(!active)await startSession(); else await stopSession(); }

async function startSession(){
  active=true; setUI('waiting');
  const r=refs(hijoActual);
  await r.offer.remove(); await r.answer.remove(); await r.iceH.remove(); await r.iceP.remove();
  await r.control.set({active:true,ts:Date.now()});
  await createPC(); showToast(`📡 Señal enviada a ${nombreActual}`);
}

async function stopSession(){
  active=false;
  const r=refs(hijoActual);
  await r.control.set({active:false,ts:Date.now()});
  if(pc){pc.close();pc=null;} remoteAudio.srcObject=null;
  stopVolumeAnim(); setUI('idle');
  await r.offer.remove(); await r.answer.remove(); await r.iceH.remove(); await r.iceP.remove();
  showToast('⏹ Escucha detenida');
}

window.addEventListener('beforeunload',()=>{ if(active)refs(hijoActual).control.set({active:false,ts:Date.now()}); });
</script>
</body>
</html>
