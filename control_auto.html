<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DFR Auto | Control Remoto</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --verde:   #00ff88;
    --rojo:    #ff3355;
    --amarillo:#ffd000;
    --fondo:   #080c10;
    --panel:   #0d1520;
    --borde:   #1a2a3a;
    --texto:   #c8dce8;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Grid de fondo */
  body::before {
    content:'';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  header {
    width: 100%;
    padding: 20px 24px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--borde);
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #fff;
  }
  .logo span { color: var(--verde); }

  .badge-online {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.4s;
  }
  .badge-online.on  { color: var(--verde);   border-color: var(--verde);   background: rgba(0,255,136,0.08); }
  .badge-online.off { color: var(--rojo);    border-color: var(--rojo);    background: rgba(255,51,85,0.08); }
  .badge-online.wait{ color: var(--amarillo);border-color: var(--amarillo);background: rgba(255,208,0,0.08); }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.4; transform:scale(.7); }
  }

  main {
    width: 100%;
    max-width: 420px;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Tarjeta del auto */
  .card-auto {
    background: var(--panel);
    border: 1px solid var(--borde);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .card-auto::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.6s;
  }
  .card-auto.bloqueado::before {
    background: radial-gradient(circle, rgba(255,51,85,0.08) 0%, transparent 70%);
  }

  .auto-icono {
    font-size: 64px;
    margin-bottom: 8px;
    display: block;
    filter: drop-shadow(0 0 12px rgba(0,255,136,0.3));
    transition: filter 0.5s;
  }
  .bloqueado .auto-icono {
    filter: drop-shadow(0 0 12px rgba(255,51,85,0.4));
  }

  .auto-nombre {
    font-size: 13px;
    letter-spacing: 3px;
    color: #5a7a90;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .estado-label {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 2px;
    transition: color 0.4s;
  }
  .estado-label.libre    { color: var(--verde); }
  .estado-label.bloqueado{ color: var(--rojo); }
  .estado-label.esperando{ color: var(--amarillo); }

  /* Botón principal */
  .btn-principal {
    width: 100%;
    padding: 22px;
    border: none;
    border-radius: 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    -webkit-appearance: none;
  }

  .btn-principal.bloquear {
    background: linear-gradient(135deg, #c0183a, var(--rojo));
    color: #fff;
    box-shadow: 0 4px 24px rgba(255,51,85,0.35);
  }
  .btn-principal.liberar {
    background: linear-gradient(135deg, #00b862, var(--verde));
    color: #080c10;
    box-shadow: 0 4px 24px rgba(0,255,136,0.30);
  }
  .btn-principal:active {
    transform: scale(0.97);
  }
  .btn-principal:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Confirmación */
  .overlay-confirm {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,8,12,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .overlay-confirm.visible { display: flex; }

  .modal {
    background: var(--panel);
    border: 1px solid var(--borde);
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .modal-icon { font-size: 52px; margin-bottom: 12px; }
  .modal h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .modal p  { font-size: 15px; color: #5a7a90; line-height: 1.5; margin-bottom: 28px; }

  .modal-btns { display: flex; gap: 12px; }
  .modal-btns button {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    -webkit-appearance: none;
  }
  .btn-cancelar { background: var(--borde); color: var(--texto); }
  .btn-confirmar-rojo  { background: var(--rojo);  color: #fff; }
  .btn-confirmar-verde { background: var(--verde); color: #080c10; }

  /* Panel de info */
  .panel-info {
    background: var(--panel);
    border: 1px solid var(--borde);
    border-radius: 14px;
    overflow: hidden;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid var(--borde);
    font-size: 15px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: #5a7a90; letter-spacing: 1px; font-size: 13px; text-transform: uppercase; }
  .info-valor {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--texto);
  }

  /* Log */
  .log-titulo {
    font-size: 12px;
    letter-spacing: 3px;
    color: #3a5a70;
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .log-box {
    background: var(--panel);
    border: 1px solid var(--borde);
    border-radius: 12px;
    padding: 14px;
    max-height: 160px;
    overflow-y: auto;
  }
  .log-item {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(26,42,58,0.5);
    display: flex;
    gap: 10px;
  }
  .log-item:last-child { border-bottom: none; }
  .log-hora { color: #3a5a70; flex-shrink: 0; }
  .log-msg  { color: var(--texto); }
  .log-msg.ok   { color: var(--verde); }
  .log-msg.err  { color: var(--rojo); }
  .log-msg.warn { color: var(--amarillo); }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  input {
  width: 100%;
  padding: 14px 16px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid var(--borde);
  background: var(--panel);
  color: var(--texto);
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  outline: none;
  transition: border 0.3s;
}

input:focus {
  border-color: var(--verde);
}

#loginError {
  margin-top: 10px;
  font-size: 13px;
  color: var(--rojo);
  min-height: 18px;
  font-family: 'Share Tech Mono', monospace;
}
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loginScreen">

  <div class="card-auto" style="max-width:380px;margin:80px auto;">
    <span class="auto-icono">🔐</span>

    <div class="auto-nombre">DFR AUTO</div>

    <div class="estado-label libre" style="font-size:24px;margin-bottom:20px;">
      INICIAR SESIÓN
    </div>

    <input type="email" id="email" placeholder="Correo electrónico">
    <input type="password" id="password" placeholder="Contraseña">

    <button class="btn-principal liberar" onclick="iniciarSesion()">
      INGRESAR
    </button>

    <div id="loginError"></div>

  </div>

</div>

<div id="appScreen" style="display:none;">

<header>
  <div class="logo">DFR <span>AUTO</span></div>
  <div class="badge-online wait" id="badgeOnline">
    <div class="dot"></div>
    <span id="txtOnline">CONECTANDO</span>
  </div>
</header>

<main>

  <!-- Tarjeta del auto -->
  <div class="card-auto" id="cardAuto">
    <span class="auto-icono">🚗</span>
    <div class="auto-nombre">Peugeot 207 · 2010</div>
    <div class="estado-label esperando" id="estadoLabel">— — —</div>
  </div>

  <!-- Botón principal -->
  <button class="btn-principal bloquear" id="btnPrincipal" disabled onclick="pedirConfirmacion()">
    Cargando...
  </button>

  <!-- Info -->
  <div class="panel-info">
    <div class="info-row">
      <span class="info-label">Módulo ESP32</span>
      <span class="info-valor" id="infoOnline">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Último contacto</span>
      <span class="info-valor" id="infoUltVez">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Comando enviado</span>
      <span class="info-valor" id="infoComando">—</span>
    </div>
  </div>

  <!-- Log -->
  <div>
    <div class="log-titulo">// registro de eventos</div>
    <div class="log-box" id="logBox"></div>
  </div>

</main>

<!-- Modal de confirmación -->
<div class="overlay-confirm" id="overlay">
  <div class="modal">
    <div class="modal-icon" id="modalIcono">⚠️</div>
    <h2 id="modalTitulo">Confirmar</h2>
    <p id="modalDesc">¿Estás seguro?</p>
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button id="btnConfirmar" onclick="ejecutarAccion()">Confirmar</button>
    </div>
  </div>

</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, get }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ── CONFIGURACIÓN FIREBASE ─────────────────────────────
  // Reemplazá con tus datos (los mismos que usás en Sistema de Stock)
  const firebaseConfig = {
  apiKey: "AIzaSyAYooRkh0w9hL8qCvhdUxywsWMMncU5EIM",
  authDomain: "stockdfr-94cd4.firebaseapp.com",
  databaseURL: "https://stockdfr-94cd4-default-rtdb.firebaseio.com",
  projectId: "stockdfr-94cd4",
  storageBucket: "stockdfr-94cd4.appspot.com",
  messagingSenderId: "600419356379",
  appId: "1:600419356379:web:2b1bd2b32e88f71f6886fe",
  measurementId: "G-C74P47CJ19"
};
  // ────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const auth = getAuth(app);
  onAuthStateChanged(auth, (user) => {
  if (user) {
    // Usuario logueado
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appScreen").style.display = "block";
  } else {
    // Usuario NO logueado
    document.getElementById("loginScreen").style.display = "block";
    document.getElementById("appScreen").style.display = "none";
  }
});
  window.iniciarSesion = function () {
  const email = document.getElementById("email").value;
  const pass  = document.getElementById("password").value;
  const errorBox = document.getElementById("loginError");

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("appScreen").style.display = "block";
      errorBox.textContent = "";
    })
    .catch((error) => {
      errorBox.textContent = "Error: " + error.message;
    });
};

  // Referencias
  const refOnline  = ref(db, '/auto/online');
  const refEstado  = ref(db, '/auto/estado');
  const refUltVez  = ref(db, '/auto/ultima_vez');
  const refComando = ref(db, '/auto/comando');

  // Estado local
  let estadoActual = null;
  let accionPendiente = null;

  // ── ESCUCHAR CAMBIOS EN TIEMPO REAL ──────────────────────

  // Online / offline del ESP32
  onValue(refOnline, snap => {
    const online = snap.val();
    const badge  = document.getElementById('badgeOnline');
    const txt    = document.getElementById('txtOnline');
    const infoOnline = document.getElementById('infoOnline');

    if (online === true) {
      badge.className = 'badge-online on';
      txt.textContent = 'EN LÍNEA';
      infoOnline.textContent = '🟢 Conectado';
      document.getElementById('btnPrincipal').disabled = false;
    } else {
      badge.className = 'badge-online off';
      txt.textContent = 'SIN SEÑAL';
      infoOnline.textContent = '🔴 Desconectado';
      document.getElementById('btnPrincipal').disabled = true;
    }
  });

  // Estado del motor
  onValue(refEstado, snap => {
    const estado = snap.val();
    estadoActual = estado;
    actualizarUI(estado);
  });

  // Último contacto
  onValue(refUltVez, snap => {
    const v = snap.val();
    document.getElementById('infoUltVez').textContent = v || '—';
  });

  // ── ACTUALIZAR UI SEGÚN ESTADO ────────────────────────────
  function actualizarUI(estado) {
    const label    = document.getElementById('estadoLabel');
    const btn      = document.getElementById('btnPrincipal');
    const card     = document.getElementById('cardAuto');
    const infoCmd  = document.getElementById('infoComando');

    if (estado === 'bloqueado') {
      label.textContent = 'BLOQUEADO';
      label.className   = 'estado-label bloqueado';
      btn.textContent   = '🔓 Liberar Motor';
      btn.className     = 'btn-principal liberar';
      card.className    = 'card-auto bloqueado';
      infoCmd.textContent = 'bloqueado';
    } else if (estado === 'libre') {
      label.textContent = 'LIBRE';
      label.className   = 'estado-label libre';
      btn.textContent   = '🔒 Bloquear Motor';
      btn.className     = 'btn-principal bloquear';
      card.className    = 'card-auto';
      infoCmd.textContent = 'libre';
    } else {
      label.textContent = '— — —';
      label.className   = 'estado-label esperando';
    }
  }

  // ── CONFIRMAR ACCIÓN ──────────────────────────────────────
  window.pedirConfirmacion = function() {
    const esLibre = estadoActual === 'libre';
    accionPendiente = esLibre ? 'bloqueado' : 'libre';

    document.getElementById('modalIcono').textContent = esLibre ? '🔒' : '🔓';
    document.getElementById('modalTitulo').textContent = esLibre ? 'Bloquear Motor' : 'Liberar Motor';
    document.getElementById('modalDesc').textContent = esLibre
      ? 'El auto no podrá arrancar hasta que lo liberes. ¿Confirmás?'
      : 'El motor quedará habilitado para arrancar. ¿Confirmás?';

    const btnC = document.getElementById('btnConfirmar');
    btnC.textContent  = esLibre ? 'Sí, bloquear' : 'Sí, liberar';
    btnC.className    = esLibre ? 'btn-confirmar-rojo' : 'btn-confirmar-verde';

    document.getElementById('overlay').classList.add('visible');
  };

  window.cerrarModal = function() {
    document.getElementById('overlay').classList.remove('visible');
    accionPendiente = null;
  };

  window.ejecutarAccion = async function() {
    cerrarModal();
    if (!accionPendiente) return;

    const btn = document.getElementById('btnPrincipal');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Enviando...';

    try {
      await set(refComando, accionPendiente);
      agregarLog(`Comando enviado: ${accionPendiente}`, 'ok');
    } catch (err) {
      agregarLog(`Error: ${err.message}`, 'err');
      btn.disabled = false;
    }
    accionPendiente = null;
  };

  // ── LOG ───────────────────────────────────────────────────
  function agregarLog(msg, tipo = '') {
    const box  = document.getElementById('logBox');
    const ahora = new Date();
    const hora  = ahora.toTimeString().slice(0,8);
    const item  = document.createElement('div');
    item.className = 'log-item';
    item.innerHTML = `<span class="log-hora">${hora}</span><span class="log-msg ${tipo}">${msg}</span>`;
    box.prepend(item);
    // Máximo 30 entradas
    while (box.children.length > 30) box.removeChild(box.lastChild);
  }

  agregarLog('App iniciada', 'ok');
  agregarLog('Conectando a Firebase...', 'warn');
</script>
</body>
</html>
