<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFR Auto</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#080c10; color:#c8dce8; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px; }
header { width:100%; max-width:420px; display:flex; justify-content:space-between; align-items:center; padding:16px 0; margin-bottom:20px; }
.logo { font-size:22px; font-weight:bold; color:#fff; letter-spacing:3px; }
.logo span { color:#00ff88; }
.badge { font-size:12px; padding:4px 12px; border-radius:20px; border:1px solid; }
.badge.on { color:#00ff88; border-color:#00ff88; }
.badge.off { color:#ff3355; border-color:#ff3355; }
.badge.wait { color:#ffd000; border-color:#ffd000; }
.card { width:100%; max-width:420px; background:#0d1520; border:1px solid #1a2a3a; border-radius:16px; padding:24px; text-align:center; margin-bottom:16px; }
.auto-icono { font-size:64px; display:block; margin-bottom:8px; }
.auto-nombre { font-size:13px; color:#5a7a90; letter-spacing:2px; margin-bottom:8px; }
.estado { font-size:32px; font-weight:bold; letter-spacing:2px; }
.estado.libre { color:#00ff88; }
.estado.bloqueado { color:#ff3355; }
.estado.wait { color:#ffd000; }
.btn { width:100%; max-width:420px; padding:20px; border:none; border-radius:14px; font-size:20px; font-weight:bold; letter-spacing:2px; cursor:pointer; margin-bottom:16px; }
.btn.bloquear { background:#ff3355; color:#fff; }
.btn.liberar { background:#00ff88; color:#080c10; }
.btn:disabled { opacity:0.5; }
.panel { width:100%; max-width:420px; background:#0d1520; border:1px solid #1a2a3a; border-radius:14px; overflow:hidden; margin-bottom:16px; }
.fila { display:flex; justify-content:space-between; padding:14px 18px; border-bottom:1px solid #1a2a3a; font-size:14px; }
.fila:last-child { border-bottom:none; }
.fila-label { color:#5a7a90; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:100; align-items:center; justify-content:center; padding:24px; }
.overlay.visible { display:flex; }
.modal { background:#0d1520; border:1px solid #1a2a3a; border-radius:20px; padding:32px 24px; width:100%; max-width:360px; text-align:center; }
.modal h2 { font-size:24px; margin-bottom:8px; }
.modal p { color:#5a7a90; margin-bottom:24px; }
.modal-btns { display:flex; gap:12px; }
.modal-btns button { flex:1; padding:16px; border:none; border-radius:12px; font-size:17px; font-weight:bold; cursor:pointer; }
.btn-cancel { background:#1a2a3a; color:#c8dce8; }
.btn-ok-rojo { background:#ff3355; color:#fff; }
.btn-ok-verde { background:#00ff88; color:#080c10; }
</style>
</head>
<body>

<header>
  <div class="logo">DFR <span>AUTO</span></div>
  <div class="badge wait" id="badge">CONECTANDO</div>
</header>

<div class="card">
  <span class="auto-icono">🚗</span>
  <div class="auto-nombre">PEUGEOT 207 · 2010</div>
  <div class="estado wait" id="estado">— — —</div>
</div>

<button class="btn bloquear" id="btnPrincipal" disabled onclick="pedirConfirm()">Cargando...</button>

<div class="panel">
  <div class="fila"><span class="fila-label">Módulo</span><span id="infoOnline">—</span></div>
  <div class="fila"><span class="fila-label">Último contacto</span><span id="infoUltVez">—</span></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div style="font-size:48px;margin-bottom:12px" id="mIcon">⚠️</div>
    <h2 id="mTitulo">Confirmar</h2>
    <p id="mDesc">¿Estás seguro?</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button id="btnOk" onclick="ejecutar()">Confirmar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDo1ywPhAW50qEpFWwBu2uEUwX-AfxTWK0",
  authDomain: "stockdfr-94cd4.firebaseapp.com",
  databaseURL: "https://stockdfr-94cd4-default-rtdb.firebaseio.com",
  projectId: "stockdfr-94cd4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let estadoActual = null;
let accion = null;

onValue(ref(db, '/auto/online'), snap => {
  const online = snap.val();
  const badge = document.getElementById('badge');
  if (online) {
    badge.textContent = 'EN LINEA';
    badge.className = 'badge on';
    document.getElementById('btnPrincipal').disabled = false;
  } else {
    badge.textContent = 'SIN SENAL';
    badge.className = 'badge off';
    document.getElementById('btnPrincipal').disabled = true;
  }
});

onValue(ref(db, '/auto/estado'), snap => {
  const e = snap.val();
  estadoActual = e;
  const el = document.getElementById('estado');
  const btn = document.getElementById('btnPrincipal');
  if (e === 'bloqueado') {
    el.textContent = 'BLOQUEADO'; el.className = 'estado bloqueado';
    btn.textContent = 'Liberar Motor'; btn.className = 'btn liberar';
  } else if (e === 'libre') {
    el.textContent = 'LIBRE'; el.className = 'estado libre';
    btn.textContent = 'Bloquear Motor'; btn.className = 'btn bloquear';
  }
});

onValue(ref(db, '/auto/ultima_vez'), snap => {
  document.getElementById('infoUltVez').textContent = snap.val() || '-';
});

window.pedirConfirm = function() {
  const esLibre = estadoActual === 'libre';
  accion = esLibre ? 'bloqueado' : 'libre';
  document.getElementById('mIcon').textContent = esLibre ? '🔒' : '🔓';
  document.getElementById('mTitulo').textContent = esLibre ? 'Bloquear Motor' : 'Liberar Motor';
  document.getElementById('mDesc').textContent = esLibre ? 'Confirmas que queres bloquear el motor?' : 'Confirmas que queres liberar el motor?';
  const btnOk = document.getElementById('btnOk');
  btnOk.textContent = esLibre ? 'Si, bloquear' : 'Si, liberar';
  btnOk.className = esLibre ? 'btn-ok-rojo' : 'btn-ok-verde';
  document.getElementById('overlay').classList.add('visible');
};

window.cerrarModal = function() {
  document.getElementById('overlay').classList.remove('visible');
};

window.ejecutar = async function() {
  cerrarModal();
  await set(ref(db, '/auto/comando'), accion);
};
</script>
</body>
</html>
